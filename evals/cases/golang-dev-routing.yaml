- description: "concurrency skill triggers on goroutine question"
  vars:
    prompt: "How do I use goroutines with channels and select in Go?"
  metadata:
    tags: ["@routing", "@golang-dev"]
  assert:
    - type: icontains
      value: "goroutine"
    - type: icontains-any
      value: ["channel", "select", "go func", "concurrent"]

- description: "error-handling skill triggers on error wrapping"
  vars:
    prompt: "How should I wrap and handle errors idiomatically in Go?"
  metadata:
    tags: ["@routing", "@golang-dev"]
  assert:
    - type: icontains
      value: "error"
    - type: icontains-any
      value: ["errors.Is", "errors.As", "fmt.Errorf", "%w", "wrap"]

- description: "testing skill triggers on table-driven test"
  vars:
    prompt: "Show me how to write table-driven tests with testify in Go"
  metadata:
    tags: ["@routing", "@golang-dev"]
  assert:
    - type: icontains
      value: "test"
    - type: icontains-any
      value: ["table", "testify", "t.Run", "assert"]

- description: "naming skill triggers on naming convention"
  vars:
    prompt: "What are Go naming conventions for packages and interfaces?"
  metadata:
    tags: ["@routing", "@golang-dev"]
  assert:
    - type: icontains
      value: "package"
    - type: icontains-any
      value: ["naming", "convention", "interface", "exported"]
