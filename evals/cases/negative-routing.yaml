- description: "Python question does not produce Go-specific content"
  vars:
    prompt: "How do I use asyncio and aiohttp in Python to fetch URLs concurrently?"
  metadata:
    tags: ["@routing", "@negative"]
  assert:
    - type: not-icontains
      value: "goroutine"
    - type: not-icontains
      value: "go func"
    - type: not-icontains
      value: "errgroup"

- description: "JavaScript question does not produce Rust-specific content"
  vars:
    prompt: "How do I handle errors in JavaScript with try/catch and async/await?"
  metadata:
    tags: ["@routing", "@negative"]
  assert:
    - type: not-icontains
      value: "thiserror"
    - type: not-icontains
      value: "anyhow"
    - type: not-icontains
      value: "borrow checker"

- description: "Docker question does not produce Nix-specific content"
  vars:
    prompt: "How do I write a multi-stage Dockerfile for a Node.js app?"
  metadata:
    tags: ["@routing", "@negative"]
  assert:
    - type: not-icontains
      value: "flake.nix"
    - type: not-icontains
      value: "devenv"
    - type: not-icontains
      value: "nixpkgs"

- description: "GitHub Actions question does not produce GitLab-specific content"
