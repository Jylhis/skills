- description: "session-log skill produces correct log format"
  vars:
    prompt: "Log a session spanning 2026-04-08 and 2026-04-09. Topics: analysis of competitor pricing strategies, decision to pivot positioning from 'cheaper' to 'faster', creation of a 1-page positioning framework, draft email to the sales team. Include CHUNK markers for the framework and email. Show how to append if there were pre-existing bullets on 2026-04-09."
  metadata:
    tags: ["@quality", "@productivity"]
  assert:
    - type: llm-rubric
      weight: 2
      metric: log-format
      threshold: 0.67
      value: |
        The response must:
        1. Use ## YYYY-MM-DD format for date headers (not ### or other levels)
        2. Topics are bullet points (- Topic), NOT subheadings (### Topic)
        3. Nested bullets for details, each one sentence max
        4. Include CHUNK: markers for the positioning framework and email draft
    - type: llm-rubric
      weight: 1
      metric: log-behavior
      threshold: 0.67
      value: |
        The response must:
        1. Separate entries correctly between 2026-04-08 and 2026-04-09
        2. Show appending to existing 2026-04-09 bullets without replacing them
        3. No explanatory intro or meta-commentary like 'In this session we discussed...'
        4. Dates in reverse chronological order (newest first) preferred; if chronological, the ordering must be consistent
