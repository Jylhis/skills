- description: "obsidian-markdown produces correct vault note structure"
  vars:
    prompt: "Create an Obsidian note structure for a software project. Design notes for: Project Overview (links to team, milestones, architecture), Architecture (embeds diagrams, links to modules), Module Alpha (file parsing), Module Beta (caching). Use properties, wikilinks, embeds for diagrams, callouts for warnings, and block IDs for linking to specific sections."
  metadata:
    tags: ["@quality", "@obsidian"]
  assert:
    - type: llm-rubric
      weight: 2
      metric: obsidian-syntax
      threshold: 0.67
      value: |
        The response must:
        1. Use wikilinks [[Note Name]] for all vault-internal links, NOT markdown links [text](url)
        2. Use embed syntax ![[image.png]] or ![[Note#section]] for diagrams, NOT inline images with markdown syntax for vault content
        3. Callout syntax must be correct: > [!type] on first line, content on subsequent > lines
    - type: llm-rubric
      weight: 1
      metric: note-structure
      threshold: 0.67
      value: |
        The response must:
        1. Each note must have YAML frontmatter properties (at minimum: title, and one of status/tags/aliases)
        2. At least one block ID (^block-id) for subsection linking
        3. Notes link bidirectionally (Architecture links to Modules AND Modules link back to Architecture)

- description: "json-canvas produces valid canvas structure"
  vars:
    prompt: "Create an Obsidian .canvas JSON file for a system architecture diagram with 4 nodes (API Gateway, Auth Service, Database, Cache) connected by edges showing request flow. Include a group node for 'Backend Services' containing Auth Service and Database."
  metadata:
    tags: ["@quality", "@obsidian"]
  assert:
    - type: llm-rubric
      weight: 2
      metric: canvas-schema
      threshold: 0.67
      value: |
        The response must:
        1. Output valid JSON matching the JSON Canvas spec (nodes array, edges array)
        2. Each node has id, type, x, y, width, height fields
        3. Edges reference valid node IDs with fromNode/toNode (or fromSide/toSide)
    - type: llm-rubric
      weight: 1
      metric: canvas-layout
      threshold: 0.67
      value: |
        The response must:
        1. Group node contains child nodes (via the group type or equivalent)
        2. Nodes do not overlap (x/y positions are spread out)
