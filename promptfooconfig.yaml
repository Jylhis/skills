# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
description: jstack skill and routing evals

prompts:
  - "{{prompt}}"

providers:
  - id: anthropic:messages:claude-sonnet-4-6
    config:
      max_tokens: 4096
      temperature: 0

defaultTest:
  assert:
    - type: latency
      threshold: 60000
  options:
    provider:
      id: anthropic:messages:claude-sonnet-4-6

evaluateOptions:
  maxConcurrency: 2
  delay: 2000

tests:
  # Per-plugin routing tests (@routing)
  - file://evals/cases/claude-ecosystem-routing.yaml
  - file://evals/cases/gitlab-dev-routing.yaml
  - file://evals/cases/golang-dev-routing.yaml
  - file://evals/cases/nix-dev-routing.yaml
  - file://evals/cases/obsidian-routing.yaml
  - file://evals/cases/productivity-routing.yaml
  - file://evals/cases/rust-dev-routing.yaml
  - file://evals/cases/skill-creator-routing.yaml
  - file://evals/cases/emacs-dev-routing.yaml
  # Cross-plugin discovery tests (@discovery)
  - file://evals/cases/discovery-tests.yaml
  # Negative routing tests (@negative)
  - file://evals/cases/negative-routing.yaml
  # Per-plugin quality tests (@quality)
  - file://evals/cases/claude-ecosystem-quality.yaml
  - file://evals/cases/gitlab-dev-quality.yaml
  - file://evals/cases/golang-dev-quality.yaml
  - file://evals/cases/nix-dev-quality.yaml
  - file://evals/cases/obsidian-quality.yaml
  - file://evals/cases/productivity-quality.yaml
  - file://evals/cases/rust-dev-quality.yaml
  - file://evals/cases/skill-creator-quality.yaml
  - file://evals/cases/emacs-dev-quality.yaml
