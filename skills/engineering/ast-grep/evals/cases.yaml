# Eval suite for the `ast-grep` skill (skills/unix/ast-grep).
#
# Schema: see evals/scripts/expand.py for the full contract.
# - kind: trigger_positive | trigger_negative | output_quality
# - providers: which targets the case runs against (default per kind)
# - near_miss_vocabulary: required for trigger_negative (Doc 2 §4)
# - assert.triggered: ast-grep | null  — claude-only signal
# - assert.contains / regex / not_regex / output_match_regex: deterministic
# - assert.rubric: optional g-eval criteria

cases:
  # ────────────────────────────────────────────────────────────────────
  # Trigger positives (Claude only — see Doc 2 §6 cross-CLI fallacy)
  # ────────────────────────────────────────────────────────────────────
  - id: trigger-pos-console-log
    kind: trigger_positive
    expected_skill: ast-grep
    providers: [claude]
    pass_threshold: 0.5
    prompt: |
      I have a TypeScript codebase and I want to find every call site
      that does `console.log(<anything>)`, including nested expressions.
      A regex would miss multi-line cases. How do I do this structurally?
    assert:
      triggered: ast-grep
      not_regex:
        - '\b(I apologize|As an AI)\b'
      max_latency_ms: 60000

  - id: trigger-pos-codemod-var-let
    kind: trigger_positive
    expected_skill: ast-grep
    providers: [claude]
    pass_threshold: 0.5
    prompt: |
      Rewrite every `var x = ...;` declaration to `let x = ...;` across
      a JavaScript repository, but only at the top level (not inside
      function bodies). Show me the command.
    assert:
      triggered: ast-grep
      not_regex:
        - '\b(I apologize|As an AI)\b'
      max_latency_ms: 60000

  - id: trigger-pos-useState-no-default
    kind: trigger_positive
    expected_skill: ast-grep
    providers: [claude]
    pass_threshold: 0.5
    prompt: |
      Find every React `useState()` call without a default-value
      argument across a TSX repo. I need a structural matcher, not a
      regex.
    assert:
      triggered: ast-grep
      not_regex:
        - '\b(I apologize|As an AI)\b'
      max_latency_ms: 60000

  # ────────────────────────────────────────────────────────────────────
  # Trigger negatives (Claude only). MUST be near-misses — they contain
  # ast-grep-adjacent vocabulary but the right answer is not ast-grep.
  # ────────────────────────────────────────────────────────────────────
  - id: trigger-neg-grep-todo
    kind: trigger_negative
    expected_skill: null
    providers: [claude]
    pass_threshold: 0.5
    near_miss_vocabulary: ["ast-grep", "structural", "regex"]
    prompt: |
      Run a plain text search for `TODO` across this repo — I don't
      need structural matching, just any line that contains the
      substring. ast-grep is overkill for this; what's the simplest
      grep invocation?
    assert:
      triggered: null
      max_latency_ms: 60000

  - id: trigger-neg-edit-config
    kind: trigger_negative
    expected_skill: null
    providers: [claude]
    pass_threshold: 0.5
    near_miss_vocabulary: ["ast-grep", "sgconfig"]
    prompt: |
      Open my `sgconfig.yml` ast-grep configuration file in $EDITOR so
      I can hand-edit the rule list.
    assert:
      triggered: null
      max_latency_ms: 60000

  - id: trigger-neg-explain-comby
    kind: trigger_negative
    expected_skill: null
    providers: [claude]
    pass_threshold: 0.5
    near_miss_vocabulary: ["ast-grep", "Comby", "structural"]
    prompt: |
      Explain the architectural differences between ast-grep and Comby
      as structural search tools. I'm comparing them for a write-up;
      don't run anything.
    assert:
      triggered: null
      max_latency_ms: 60000

  # ────────────────────────────────────────────────────────────────────
  # Output quality (all four providers — the cross-CLI comparable lane)
  # ────────────────────────────────────────────────────────────────────
  - id: output-quality-runnable-pattern
    kind: output_quality
    expected_skill: ast-grep
    providers: [claude, codex, pi]
    pass_threshold: 1.0
    prompt: |
      Show me an `ast-grep` command that finds every call to
      `console.log` in TypeScript files under `src/`, using a
      structural pattern (not a regex) and a meta-variable for the
      argument. Output only the command, no prose.
    assert:
      output_match_regex: 'ast-grep[^\n]*-p[^\n]*\$[A-Z_]+'
      not_regex:
        - '\b(I apologize|As an AI)\b'
      max_latency_ms: 60000
      rubric:
        - "The command uses ast-grep run or ast-grep with -p flag"
        - "The pattern uses a meta-variable like $ARG or $A"
        - "The language flag specifies TypeScript (-l ts or --lang typescript)"

  - id: output-quality-yaml-rule
    kind: output_quality
    expected_skill: ast-grep
    providers: [claude, codex, pi]
    pass_threshold: 1.0
    prompt: |
      Write a minimal `ast-grep` YAML rule that warns on every
      JavaScript `eval(...)` call. Use the standard rule schema with
      `id`, `language`, and `rule.pattern` fields. Output only the
      YAML, no prose.
    assert:
      contains_all: ["id:", "language:", "pattern:"]
      output_match_regex: 'eval\(\$[A-Z_]+\)'
      not_regex:
        - '\b(I apologize|As an AI)\b'
      max_latency_ms: 60000
      rubric:
        - "The rule has top-level id, language, and rule fields"
        - "The pattern matches eval() with a meta-variable argument"
        - "The language is js or javascript"
