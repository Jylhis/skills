# W20 (repeated_keys) fires on flat-attribute module style like:
#   nixpkgs.config.allowUnfree = true;
#   nixpkgs.hostPlatform = "...";
# This is idiomatic in NixOS/nix-darwin configs.
disabled = ["repeated_keys"]

