# https://devenv.sh/integrations/github-actions/
name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    name: check (${{ matrix.os }})
    # Per-ref, per-OS cancellation. `matrix` is only a valid context inside a
    # job, so this concurrency block must live here, not at the workflow level
    # (a workflow-level `${{ matrix.os }}` makes the workflow invalid → the run
    # fails at startup with zero jobs).
    concurrency:
      group: ci-${{ github.ref }}-${{ matrix.os }}
      cancel-in-progress: true
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            accept-flake-config = true
            experimental-features = nix-command flakes

      - uses: cachix/cachix-action@v15
        with:
          name: devenv

      - name: Install devenv
        run: nix profile install nixpkgs#devenv

      - name: Build dev shell
        run: devenv shell -- echo "shell ok"

      - name: Run devenv tests
        run: devenv test

      - name: Upload eval results (if any)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-results-${{ matrix.os }}
          path: evals/results/
          if-no-files-found: ignore
          retention-days: 14
