# https://devenv.sh/integrations/github-actions/
name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}-${{ matrix.os }}
  cancel-in-progress: true

jobs:
  check:
    name: check (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            accept-flake-config = true
            experimental-features = nix-command flakes

      # https://devenv.sh/binary-caching/
      # cachix-action auto-pushes every store path realised during this
      # job to the jylhis cache.
      - uses: cachix/cachix-action@v15
        with:
          name: jylhis
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - uses: cachix/cachix-action@v15
        with:
          name: devenv

      - name: nix flake check
        run: nix flake check -L

      - name: Build packages
        run: nix build -L .#default .#options-doc

      - name: Install devenv
        run: nix profile install nixpkgs#devenv

      - name: Build dev shell
        run: devenv shell -- echo "shell ok"

      - name: Run devenv tests
        run: devenv test

      - name: Validate skills
        run: python3 scripts/validate_skills.py
